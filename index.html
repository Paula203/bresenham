<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bresenham</title>

    <style>
        body {
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        canvas {
            border: 1px solid black;
            background-color: #f9f9f9;
        }
        table {
            margin-top: 20px;
            border-collapse: collapse;
            min-width: 300px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #eee;
        }
        .controles {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h2> ALGORITMO DE BRESENHAM </h2>
<div class="controles">
    <label> X0: <input type="number" id="x0" value="2"></label>
    <label> Y0: <input type="number" id="y0" value="2"></label>
    <label> X1: <input type="number" id="x1" value="15"></label>
    <label> Y1: <input type="number" id="y1" value="10"></label>

    <button onclick="dibujar()"> Dibujar </button>

    </div>
    <canvas id="canvas" width="400" height="400"></canvas>

    <h3> Tabla de pasos </h3>
    <table id="tabla">
        <thead>
        <tr>
            <th> Paso </th>
            <th> X </th>
            <th> Y </th>
            <th> error </th>
        </tr>
        </thead>
        <tbody id="cuerpoTabla">
        </tbody>

    </table>

    <script src="script.js"></script>
    

</body>
</html>
